<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREAFLY 老師後台 v1.3</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%9A%9F%3C/text%3E%3C/svg%3E">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0a1929, #1e3a5f);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: #4dd0e1;
        }
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .status-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
        }
        .status-card strong { color: #4dd0e1; font-size: 18px; }
        .status-bar.ws-connected { color: #4ade80; }
        .status-bar.ws-disconnected { color: #f87171; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            background: rgba(77,208,225,0.2);
            color: #4dd0e1;
            font-weight: 600;
        }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.3), transparent); font-weight: 700; }
        .rank-2 { background: linear-gradient(90deg, rgba(192,192,192,0.3), transparent); }
        .rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.3), transparent); }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.on { background: #4ade80; }
        .status-dot.off { background: #f87171; }
        .actions {
            margin-top: 24px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .actions h2 { margin: 0 0 12px; font-size: 18px; color: #4dd0e1; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .btn {
            background: #4dd0e1;
            color: #0a1929;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover { background: #80deea; }
        .btn.danger { background: #f87171; color: #fff; }
        .btn.danger:hover { background: #fca5a5; }
        .btn.success { background: #4ade80; color: #0a1929; }
        .btn-row select, .btn-row input {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 4px solid #4dd0e1;
            z-index: 1000;
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 CREAFLY 老師後台</h1>
        <div class="subtitle">v1.3 · 純 WebSocket LAN · 學生連線到此 server 才會出現在列表</div>

        <div class="status-bar">
            <div class="status-card">
                <div>WebSocket 狀態</div>
                <div id="ws-status" class="ws-disconnected">🔴 未連線</div>
            </div>
            <div class="status-card">
                <div>連線學生</div>
                <div><strong id="student-count">0</strong> / 12</div>
            </div>
            <div class="status-card">
                <div>本機 IP</div>
                <div id="local-ip" style="font-family: Consolas, monospace; font-size: 12px;">—</div>
            </div>
        </div>

        <h2>📋 學生一覽表</h2>
        <table id="student-table">
            <thead>
                <tr>
                    <th>排名</th>
                    <th>名字</th>
                    <th>連線</th>
                    <th>目前關卡</th>
                    <th>完成時間</th>
                </tr>
            </thead>
            <tbody id="student-tbody">
                <tr><td colspan="5" class="empty">尚無學生連線</td></tr>
            </tbody>
        </table>

        <div class="actions">
            <h2>📡 老師控制</h2>
            <div class="btn-row">
                <select id="level-select">
                    <option value="1-0">1-0 搖桿熱身</option>
                    <option value="1-1">1-1 垂直起降</option>
                    <option value="1-2">1-2 水平移動</option>
                    <option value="1-3">1-3 旋轉</option>
                    <option value="1-4" selected>1-4 鑽第一個圈</option>
                    <option value="1-5">1-5 旋轉鑽圈</option>
                </select>
                <button class="btn" onclick="loadLevel()">📋 載入關卡</button>
                <button class="btn danger" onclick="resetAll()">🔄 廣播重置</button>
                <button class="btn success" onclick="raceStart()">🏁 開始比賽</button>
            </div>
            <div class="btn-row">
                <input id="msg-text" type="text" placeholder="廣播訊息（給所有學生）" style="flex: 1;">
                <button class="btn" onclick="sendMessage()">📢 送出</button>
            </div>
        </div>
    </div>

    <script>
        const wsState = { ws: null, connected: false };
        const students = new Map();

        function connectWS() {
            // WS 與頁面同主機同 port：HTTPS→wss、HTTP→ws（Railway 等雲端只開一個 port）
            const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${proto}//${window.location.host}/teacher`;
            try {
                wsState.ws = new WebSocket(url);
            } catch (e) {
                scheduleReconnect();
                return;
            }
            wsState.ws.onopen = () => {
                wsState.connected = true;
                document.getElementById('ws-status').textContent = '🟢 已連線';
                document.getElementById('ws-status').className = 'ws-connected';
            };
            wsState.ws.onmessage = (ev) => {
                try {
                    const msg = JSON.parse(ev.data);
                    if (msg.type === 'student_list') {
                        renderStudents(msg.students);
                    } else if (msg.type === 'student_update') {
                        const s = students.get(msg.student.id) || {};
                        Object.assign(s, msg.student);
                        students.set(msg.student.id, s);
                        renderStudents(Array.from(students.values()));
                    }
                } catch (e) {}
            };
            wsState.ws.onclose = () => {
                wsState.connected = false;
                document.getElementById('ws-status').textContent = '🔴 未連線';
                document.getElementById('ws-status').className = 'ws-disconnected';
                scheduleReconnect();
            };
        }
        function scheduleReconnect() {
            setTimeout(connectWS, 2000);
        }

        function send(payload) {
            if (!wsState.connected) {
                showToast('尚未連線到 server', true);
                return;
            }
            wsState.ws.send(JSON.stringify({ type: 'broadcast', payload }));
        }

        function loadLevel() {
            const id = document.getElementById('level-select').value;
            send({ type: 'load_level', levelId: id });
            showToast(`📋 載入 ${id}`, false);
        }
        function resetAll() {
            if (!confirm('確定要重置所有學生？')) return;
            send({ type: 'reset_all' });
            showToast('🔄 廣播重置', false);
        }
        function raceStart() {
            const id = document.getElementById('level-select').value;
            if (!confirm(`開始比賽模式（${id}）？所有學生會同步載入並計時`)) return;
            send({ type: 'race_start', levelId: id });
            showToast(`🏁 比賽開始（${id}）`, false);
        }
        function sendMessage() {
            const text = document.getElementById('msg-text').value.trim();
            if (!text) return;
            send({ type: 'show_message', text });
            document.getElementById('msg-text').value = '';
            showToast(`📢 廣播：${text}`, false);
        }

        function renderStudents(list) {
            // 排序：依時間短到長（沒時間排最後）
            list.sort((a, b) => {
                if (a.time != null && b.time != null) return a.time - b.time;
                if (a.time != null) return -1;
                if (b.time != null) return 1;
                return 0;
            });
            document.getElementById('student-count').textContent = list.filter(s => s.connected).length;
            const tbody = document.getElementById('student-tbody');
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">尚無學生連線</td></tr>';
                return;
            }
            tbody.innerHTML = list.map((s, idx) => {
                const rank = s.time != null ? idx + 1 : '-';
                const rankClass = s.time != null && idx < 3 ? `rank-${idx + 1}` : '';
                const time = s.time != null ? `${(s.time/1000).toFixed(1)}s` : '—';
                return `<tr class="${rankClass}">
                    <td>${rank}</td>
                    <td>${s.name}${s.emoji || ''}</td>
                    <td><span class="status-dot ${s.connected ? 'on' : 'off'}"></span>${s.connected ? '線上' : '離線'}</td>
                    <td>${s.level || '—'}</td>
                    <td>${time}</td>
                </tr>`;
            }).join('');
        }

        function showToast(text, isError) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (isError) toast.style.borderLeftColor = '#f87171';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // 顯示本機 IP（學生掃 QR 用）
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
            document.getElementById('local-ip').textContent = d.ip || '查不到';
        }).catch(() => {
            document.getElementById('local-ip').textContent = window.location.hostname;
        });

        connectWS();
    </script>
</body>
</html>
